<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Aspen — AI RPG Engine</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #252525;
    --border: #3a3a3a;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #c9a227;
    --gm: #d4b483;
    --user: #8ecae6;
    --ai: #ffb5a7;
    --danger: #e76f51;
    --success: #2a9d8f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  #sidebar {
    width: 320px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 1rem;
    gap: 1rem;
    flex-shrink: 0;
  }
  #sidebar h2 { font-size: 1rem; color: var(--accent); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .section { display: flex; flex-direction: column; gap: 0.5rem; }
  label { font-size: 0.8rem; color: var(--muted); }
  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.5rem;
    border-radius: 4px;
    font-size: 0.9rem;
  }
  textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .row { display: flex; gap: 0.5rem; align-items: center; }
  .row > * { flex: 1; }
  button {
    background: var(--accent);
    color: #1a1200;
    border: none;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
  }
  button.secondary { background: var(--border); color: var(--text); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .toggle { display: flex; align-items: center; justify-content: space-between; }
  .toggle input { transform: scale(1.2); }
  .hidden { display: none !important; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 1rem;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  #topBar button { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
  #diceBanner {
    text-align: center;
    padding: 0.4rem;
    font-weight: 700;
    color: var(--accent);
    background: #2a2518;
    border-bottom: 1px solid var(--border);
  }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .entry {
    max-width: 80%;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    line-height: 1.45;
    white-space: pre-wrap;
  }
  .entry.gm { background: #2e2a1f; color: var(--gm); border-left: 4px solid var(--gm); align-self: center; max-width: 90%; }
  .entry.user { background: #1f2e35; color: var(--user); border-right: 4px solid var(--user); align-self: flex-end; }
  .entry.ai { background: #35251f; color: var(--ai); border-left: 4px solid var(--ai); align-self: flex-start; }
  .entry .meta { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.25rem; font-weight: 700; text-transform: uppercase; }
  #inputBar {
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
    background: var(--panel);
  }
  #inputBar textarea { flex: 1; min-height: 48px; max-height: 120px; }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: min(600px, 90vw);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .modal h3 { color: var(--accent); }
  .modal textarea { width: 100%; }
  .modalActions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  .tag { font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: rgba(255,255,255,0.1); display: inline-block; margin-top: 0.25rem; }
  .spinner { width: 1rem; height: 1rem; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 0.5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #hamburger { display: none; position: fixed; top: 0.5rem; left: 0.5rem; z-index: 50; background: var(--panel); border: 1px solid var(--border); padding: 0.4rem 0.6rem; border-radius: 4px; color: var(--text); font-size: 1.1rem; }
  @media (max-width: 800px) {
    body { flex-direction: column; }
    #sidebar { position: fixed; inset: 0; z-index: 40; width: 100%; transform: translateX(-100%); transition: transform 0.2s; }
    #sidebar.open { transform: translateX(0); }
    #hamburger { display: block; }
  }
</style>
</head>
<body>

<button id="hamburger" onclick="toggleSidebar()">☰</button>

<aside id="sidebar">
  <div class="section">
    <h2>Settings</h2>
    <label>API Preset</label>
    <select id="preset" onchange="applyPreset()">
      <option value="custom">Custom</option>
      <option value="llamacpp">llama.cpp</option>
      <option value="koboldcpp">koboldcpp</option>
    </select>
    <label>API URL</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:8080/v1">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="optional">
    <label>Model</label>
    <input type="text" id="model" placeholder="optional">
  </div>

  <div class="section toggle">
    <label for="dualToggle"><strong>Dual-LLM Mode (separate AI Player endpoint)</strong></label>
    <input type="checkbox" id="dualToggle" onchange="toggleDual()">
  </div>

  <div id="dualSettings" class="section hidden">
    <label>AI Player API URL</label>
    <input type="text" id="aiApiUrl" placeholder="http://localhost:5001/v1">
    <label>AI Player API Key</label>
    <input type="password" id="aiApiKey" placeholder="optional">
    <label>AI Player Model</label>
    <input type="text" id="aiModel" placeholder="optional">
  </div>

  <div class="section toggle">
    <label for="manualToggle"><strong>Manual AI Review</strong></label>
    <input type="checkbox" id="manualToggle">
  </div>

  <div class="section">
    <label>User Player Name</label>
    <input type="text" id="userName" value="Arin">
    <label>AI Player Name</label>
    <input type="text" id="aiName" value="Elara">
  </div>

  <div class="section">
    <h2>Scenario Goal</h2>
    <label>Current objective / conflict (editable anytime)</label>
    <textarea id="scenarioGoal" rows="3" placeholder="e.g., Escape the burning tavern before the ceiling collapses..."></textarea>
  </div>

  <div class="section">
    <h2>Import / Export</h2>
    <label>Import Character Card</label>
    <input type="file" id="importCard" accept=".json" onchange="importCard(this)">
    <label>Import Scenario</label>
    <input type="file" id="importScenario" accept=".json" onchange="importScenario(this)">
    <label>Import Save</label>
    <input type="file" id="importSave" accept=".json" onchange="importSave(this)">
    <button onclick="exportSave()">Export Save</button>
  </div>

  <div class="section">
    <h2>Game</h2>
    <button onclick="restartGame()">Restart Game</button>
    <button class="secondary" onclick="clearOutput()">Clear Output</button>
  </div>
</aside>

<main id="main">
  <div id="topBar">
    <span id="statusText">Ready — configure settings and press Restart Game to begin</span>
    <button class="secondary" onclick="restartGame()">Restart Game</button>
  </div>
  <div id="diceBanner">Roll: —</div>
  <div id="log"></div>
  <div id="inputBar">
    <textarea id="userInput" placeholder="What do you do?" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendUserAction();}"></textarea>
    <button onclick="sendUserAction()">Roll d20 & Send</button>
    <button class="secondary" onclick="skipTurn()">Skip</button>
  </div>
</main>

<div id="overlay">
  <div class="modal">
    <h3>Review AI Action</h3>
    <label>The AI Player intends to:</label>
    <textarea id="aiReviewText" rows="4"></textarea>
    <div class="modalActions">
      <button class="secondary" onclick="regenerateAiAction()">Re-roll Action</button>
      <button onclick="confirmAiAction()">Confirm Roll</button>
    </div>
  </div>
</div>

<script>
// =========================
// STATE
// =========================
const state = {
  settings: {
    apiUrl: '',
    apiKey: '',
    model: '',
    dualLlM: false,
    aiApiUrl: '',
    aiApiKey: '',
    aiModel: '',
    manualReview: false,
    userName: 'Arin',
    aiName: 'Elara'
  },
  scenario: null,
  userCard: null,
  aiCard: null,
  gameLog: [],
  turnPhase: 'idle', // idle | gm | user | ai | ai_review | resolution
  lastRoll: null,
  pendingAction: null
};

// =========================
// DOM REFS
// =========================
const $ = id => document.getElementById(id);
const logEl = $('log');
const diceEl = $('diceBanner');
const inputEl = $('userInput');
const overlayEl = $('overlay');
const aiReviewText = $('aiReviewText');
const statusText = $('statusText');
const goalEl = $('scenarioGoal');

// =========================
// HELPERS
// =========================
function saveSettings() {
  state.settings.apiUrl = $('apiUrl').value.trim();
  state.settings.apiKey = $('apiKey').value.trim();
  state.settings.model = $('model').value.trim();
  state.settings.dualLlM = $('dualToggle').checked;
  state.settings.aiApiUrl = $('aiApiUrl').value.trim();
  state.settings.aiApiKey = $('aiApiKey').value.trim();
  state.settings.aiModel = $('aiModel').value.trim();
  state.settings.manualReview = $('manualToggle').checked;
  state.settings.userName = $('userName').value.trim() || 'User';
  state.settings.aiName = $('aiName').value.trim() || 'AI';
  if (!state.scenario) state.scenario = {};
  state.scenario.scenario_goal = goalEl.value.trim();
}

function loadSettingsUI() {
  $('apiUrl').value = state.settings.apiUrl;
  $('apiKey').value = state.settings.apiKey;
  $('model').value = state.settings.model;
  $('dualToggle').checked = state.settings.dualLlM;
  $('aiApiUrl').value = state.settings.aiApiUrl;
  $('aiApiKey').value = state.settings.aiApiKey;
  $('aiModel').value = state.settings.aiModel;
  $('manualToggle').checked = state.settings.manualReview;
  $('userName').value = state.settings.userName;
  $('aiName').value = state.settings.aiName;
  goalEl.value = state.scenario?.scenario_goal || '';
  toggleDual();
}

function applyPreset() {
  const p = $('preset').value;
  if (p === 'llamacpp') { $('apiUrl').value = 'http://localhost:8080/v1'; }
  else if (p === 'koboldcpp') { $('apiUrl').value = 'http://localhost:5001/v1'; }
}

function toggleDual() {
  $('dualSettings').classList.toggle('hidden', !$('dualToggle').checked);
}

function toggleSidebar() {
  $('sidebar').classList.toggle('open');
}

function rollD20() {
  return Math.floor(Math.random() * 20) + 1;
}

function renderEntry(role, text, meta) {
  const div = document.createElement('div');
  div.className = `entry ${role}`;
  const roleLabel = role === 'gm' ? 'Game Master' : role === 'user' ? state.settings.userName : state.settings.aiName;
  div.innerHTML = `<div class="meta">${roleLabel}${meta ? ` <span class="tag">${meta}</span>` : ''}</div>${escapeHtml(text)}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function appendLog(role, text, meta) {
  state.gameLog.push({ role, content: text });
  renderEntry(role, text, meta);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function setBusy(busy) {
  inputEl.disabled = busy;
  document.querySelectorAll('#inputBar button').forEach(b => b.disabled = busy);
}

function setStatus(msg) {
  statusText.textContent = msg;
}

function showDice(roll) {
  state.lastRoll = roll;
  diceEl.textContent = `Last Roll: d20 = ${roll}`;
}

function formatHistory() {
  return state.gameLog.map(e => {
    const label = e.role === 'gm' ? 'GM' : e.role === 'user' ? state.settings.userName : state.settings.aiName;
    return `[${label}] ${e.content}`;
  }).join('\n\n');
}

function getEndpoint(role) {
  if (state.settings.dualLlM && role === 'ai') {
    return {
      url: state.settings.aiApiUrl || state.settings.apiUrl,
      key: state.settings.aiApiKey || state.settings.apiKey,
      model: state.settings.aiModel || state.settings.model
    };
  }
  return { url: state.settings.apiUrl, key: state.settings.apiKey, model: state.settings.model };
}

// =========================
// API
// =========================
async function callLLM(messages, role) {
  const ep = getEndpoint(role);
  if (!ep.url) throw new Error('API URL is not configured.');
  const body = {
    model: ep.model || 'local-model',
    messages,
    temperature: 0.8,
    max_tokens: 512
  };
  const res = await fetch(`${ep.url.replace(/\/$/, '')}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(ep.key ? { 'Authorization': `Bearer ${ep.key}` } : {})
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`API error ${res.status}: ${txt}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim() || '';
}

// =========================
// PROMPT BUILDERS
// =========================
function buildGmNarrativePrompt() {
  const s = state.settings;
  const world = state.scenario
    ? (state.scenario.description + '\n' + (state.scenario.world_info || ''))
    : 'A fantasy world of mystery and adventure.';
  const userCard = state.userCard ? state.userCard.summary || '' : 'A brave adventurer.';
  const aiCard = state.aiCard ? state.aiCard.summary || '' : 'A cautious companion.';
  const history = formatHistory();
  const isFirstTurn = state.gameLog.length === 0;
  const startingScene = state.scenario?.starting_scene || '';
  const scenarioGoal = state.scenario?.scenario_goal || '';

  let userContent = `[WORLD INFO]\n${world}\n\n[CHARACTERS]\n${s.userName} — ${userCard}\n${s.aiName} — ${aiCard}\n\n`;
  if (isFirstTurn && startingScene) {
    userContent += `[STARTING SCENE]\n${startingScene}\n\n`;
  }
  if (scenarioGoal) {
    userContent += `[SCENARIO GOAL]\nThe central tension or objective right now is: ${scenarioGoal}\n\n`;
  }
  userContent += `[SCENE HISTORY]\n${history}\n\n[INSTRUCTION]\n`;
  if (isFirstTurn) {
    userContent += `Set the opening scene using the Starting Scene provided above. Introduce the situation vividly and end by setting the stage for both players to declare their first actions. Do not write actions for the players.`;
  } else {
    userContent += `Describe the current scene vividly. Keep the Scenario Goal alive in the narrative if one is provided. End your response by presenting a clear dilemma, danger, or 2–3 concrete courses of action tied to the goal or situation. Ask the players directly what they do next. Do not write actions for the players.`;
  }

  return [
    { role: 'system', content: `You are the Game Master (GM) of a tabletop RPG. You describe the world, control NPCs, and set the scene. You do NOT control the Player characters. Be vivid and concise.` },
    { role: 'user', content: userContent }
  ];
}

function buildResolutionPrompt(playerName, actionText, roll) {
  const history = formatHistory();
  return [
    { role: 'system', content: `You are the Game Master. Resolve the following player action based on the scene history and the dice roll.` },
    { role: 'user', content: `[SCENE HISTORY]\n${history}\n\n[ACTION TO RESOLVE]\n${playerName}: ${actionText}\n[DICE ROLL]\nRoll: ${roll}\n\n[INSTRUCTION]\nNarrate the outcome of this action. Be concise and move the story forward. Do not write actions for other players.` }
  ];
}

function buildAiPrompt() {
  const s = state.settings;
  const personality = state.aiCard ? (state.aiCard.personality || '') : 'Pragmatic and curious.';
  const history = formatHistory();
  return [
    { role: 'system', content: `You are roleplaying as ${s.aiName}. Personality: ${personality}. You are a PLAYER, not the GM. You only control your own character's thoughts, speech, and actions. You do NOT know anything the GM hasn't explicitly told you. You do NOT narrate the world.` },
    { role: 'user', content: `[SCENE HISTORY]\n${history}\n\n[INSTRUCTION]\nBased ONLY on the scene history above, what does ${s.aiName} do or say next? Respond with a single concise action or line of dialogue. Do not narrate the environment or other characters.` }
  ];
}

// =========================
// GAME FLOW
// =========================
async function gmNarrative() {
  saveSettings();
  if (!state.settings.apiUrl) { alert('Please configure the API URL in Settings.'); return; }
  state.turnPhase = 'gm';
  setBusy(true);
  setStatus('Game Master is narrating...');
  try {
    const prompt = buildGmNarrativePrompt();
    const text = await callLLM(prompt, 'gm');
    appendLog('gm', text);
    state.turnPhase = 'user';
    inputEl.placeholder = `${state.settings.userName}, what do you do?`;
    setStatus(`Waiting for ${state.settings.userName}...`);
  } catch (e) {
    appendLog('gm', `[Error generating narrative: ${e.message}]`);
    setStatus('Error — see log');
  } finally {
    setBusy(false);
  }
}

async function sendUserAction() {
  saveSettings();
  const text = inputEl.value.trim();
  if (!text) return;
  const allowed = state.turnPhase === 'user' || (state.turnPhase === 'gm' && state.gameLog.length === 0) || state.turnPhase === 'idle';
  if (!allowed) return;
  inputEl.value = '';
  const roll = rollD20();
  showDice(roll);
  appendLog('user', `${text} [Roll: ${roll}]`);
  setBusy(true);
  setStatus('Resolving action...');
  try {
    const prompt = buildResolutionPrompt(state.settings.userName, text, roll);
    const outcome = await callLLM(prompt, 'gm');
    appendLog('gm', outcome);
    state.turnPhase = 'ai';
    await aiTurn();
  } catch (e) {
    appendLog('gm', `[Error resolving action: ${e.message}]`);
    setStatus('Error — see log');
  } finally {
    setBusy(false);
  }
}

async function aiTurn() {
  saveSettings();
  if (state.turnPhase !== 'ai') return;
  setBusy(true);
  setStatus(`${state.settings.aiName} is deciding...`);
  try {
    const prompt = buildAiPrompt();
    const action = await callLLM(prompt, 'ai');
    state.pendingAction = action;
    if (state.settings.manualReview) {
      state.turnPhase = 'ai_review';
      aiReviewText.value = action;
      overlayEl.classList.add('show');
      setStatus('Review AI action...');
      setBusy(false);
      return;
    }
    await resolveAiAction(action);
  } catch (e) {
    appendLog('gm', `[Error generating AI action: ${e.message}]`);
    setStatus('Error — see log');
  } finally {
    if (!state.settings.manualReview) setBusy(false);
  }
}

async function resolveAiAction(action) {
  const roll = rollD20();
  showDice(roll);
  appendLog('ai', `${action} [Roll: ${roll}]`);
  state.pendingAction = null;
  state.turnPhase = 'resolution';
  setBusy(true);
  setStatus('Resolving AI action...');
  try {
    const prompt = buildResolutionPrompt(state.settings.aiName, action, roll);
    const outcome = await callLLM(prompt, 'gm');
    appendLog('gm', outcome);
    state.turnPhase = 'user';
    inputEl.placeholder = `${state.settings.userName}, what do you do?`;
    setStatus(`Waiting for ${state.settings.userName}...`);
  } catch (e) {
    appendLog('gm', `[Error resolving AI action: ${e.message}]`);
    setStatus('Error — see log');
  } finally {
    setBusy(false);
  }
}

async function confirmAiAction() {
  const text = aiReviewText.value.trim();
  if (!text) return;
  overlayEl.classList.remove('show');
  try { await resolveAiAction(text); }
  catch (e) { appendLog('gm', `[Error resolving AI action: ${e.message}]`); setStatus('Error — see log'); }
}

async function regenerateAiAction() {
  setBusy(true);
  setStatus(`Regenerating ${state.settings.aiName}'s action...`);
  try {
    const prompt = buildAiPrompt();
    const action = await callLLM(prompt, 'ai');
    state.pendingAction = action;
    aiReviewText.value = action;
  } catch (e) {
    aiReviewText.value = `[Error: ${e.message}]`;
  } finally {
    setBusy(false);
  }
}

async function skipTurn() {
  if (state.turnPhase === 'user') {
    state.turnPhase = 'ai';
    try { await aiTurn(); }
    catch (e) { appendLog('gm', `[Error during AI turn: ${e.message}]`); setStatus('Error — see log'); }
  }
}

function restartGame() {
  saveSettings();
  overlayEl.classList.remove('show');
  state.gameLog = [];
  logEl.innerHTML = '';
  state.turnPhase = 'gm';
  state.pendingAction = null;
  state.lastRoll = null;
  diceEl.textContent = 'Roll: —';
  gmNarrative();
}

function clearOutput() {
  state.gameLog = [];
  logEl.innerHTML = '';
  state.turnPhase = 'idle';
  state.pendingAction = null;
  state.lastRoll = null;
  diceEl.textContent = 'Roll: —';
  setStatus('Output cleared. Press Restart Game to begin a new session.');
}

// =========================
// IMPORT / EXPORT
// =========================
function readJsonFile(input, callback) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try { callback(JSON.parse(e.target.result)); }
    catch (err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function importCard(input) {
  readJsonFile(input, data => {
    const card = normalizeCharacterCard(data);
    if (!card) { alert('Unrecognized character card format.'); return; }
    const target = confirm(`Import "${card.name}" as the AI Player?\n(Cancel = User Player)`);
    if (target) { state.aiCard = card; $('aiName').value = card.name; }
    else { state.userCard = card; $('userName').value = card.name; }
    alert(`Imported ${card.name}.`);
  });
}

function importScenario(input) {
  readJsonFile(input, data => {
    if (data.format === 'aspen-scenario-v1') {
      state.scenario = data;
    } else if (data.title && data.description) {
      state.scenario = {
        format: 'aspen-scenario-v1',
        title: data.title,
        description: data.description,
        world_info: data.world_info || data.worldInfo || '',
        starting_scene: data.starting_scene || data.startingScene || '',
        scenario_goal: data.scenario_goal || ''
      };
    } else {
      alert('Unrecognized scenario format.'); return;
    }
    goalEl.value = state.scenario.scenario_goal || '';
    alert(`Imported scenario: ${state.scenario.title}`);
  });
}

function importSave(input) {
  readJsonFile(input, data => {
    if (data.format !== 'aspen-save-v1') { alert('Unrecognized save format.'); return; }
    state.settings = data.settings || state.settings;
    state.scenario = data.scenario || null;
    state.userCard = data.user_card || null;
    state.aiCard = data.ai_card || null;
    state.gameLog = data.game_log || [];
    loadSettingsUI();
    renderLog();
    alert('Save loaded.');
  });
}

function exportSave() {
  saveSettings();
  const payload = {
    format: 'aspen-save-v1',
    exported_at: new Date().toISOString(),
    settings: state.settings,
    scenario: state.scenario,
    user_card: state.userCard,
    ai_card: state.aiCard,
    game_log: state.gameLog
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `aspen-save-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function normalizeCharacterCard(data) {
  // Aspen native
  if (data.format === 'aspen-character-v1') {
    return {
      name: data.name || 'Unknown',
      summary: data.summary || '',
      personality: data.personality || '',
      first_message: data.first_message || '',
      example_dialogue: data.example_dialogue || []
    };
  }
  // TavernAI V2 / SillyTavern
  if (data.data) {
    const d = data.data;
    if (d.name && d.description) {
      return {
        name: d.name,
        summary: d.description || '',
        personality: d.personality || '',
        first_message: d.first_mes || '',
        example_dialogue: (d.mes_example || '').split('\n').filter(x => x.trim())
      };
    }
  }
  // Fallback
  if (data.name && (data.description || data.personality || data.summary)) {
    return {
      name: data.name,
      summary: data.description || data.summary || '',
      personality: data.personality || '',
      first_message: data.first_mes || data.first_message || '',
      example_dialogue: data.mes_example || data.example_dialogue || []
    };
  }
  return null;
}

function renderLog() {
  logEl.innerHTML = '';
  state.gameLog.forEach(e => {
    const metaMatch = e.content.match(/\[Roll: (\d+)\]/);
    const meta = metaMatch ? `Roll: ${metaMatch[1]}` : '';
    const text = e.content.replace(/ \[Roll: \d+\]/, '');
    renderEntry(e.role, text, meta);
  });
}

// =========================

// =========================
loadSettingsUI();
</script>
